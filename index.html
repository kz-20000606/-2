<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学年別：計算の工夫マスター（ランダム版）</title>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --error: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.3rem; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grade-section { margin-bottom: 20px; }
        .grade-title { font-weight: bold; font-size: 1rem; color: #555; margin-bottom: 10px; padding-left: 5px; border-left: 4px solid var(--primary); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-btn { padding: 15px 5px; font-size: 0.9rem; background: white; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; text-align: center; }
        .menu-btn:hover { background: var(--primary); color: white; }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .progress { font-size: 0.9rem; color: #666; font-weight: bold; }
        .back-to-menu { padding: 6px 12px; font-size: 0.8rem; background: #f0f0f0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; line-height: 1.6; border-left: 5px solid var(--primary); }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; background: white; font-size: 1rem; cursor: pointer; text-align: left; }
        .opt-btn:disabled { cursor: default; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
        .correct { background: #e6f4ea; border: 1px solid var(--success); color: #1e7e34; }
        .wrong { background: #fce8e8; border: 1px solid var(--error); color: #a71d2a; }
        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; display: none; cursor: pointer; }
        .hidden { display: none; }
        @media (max-width: 480px) { .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>計算の工夫トレーニング</h1>
        
        <div class="grade-section">
            <div class="grade-title">中学1年生</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('g1')">中1総合パック<br>（小数・分配法則）</button>
            </div>
        </div>

        <div class="grade-section">
            <div class="grade-title">中学2年生</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('g2')">中2総合パック<br>（等式の変形・式の値）</button>
            </div>
        </div>

        <div class="grade-section">
            <div class="grade-title">中学3年生</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('g3')">中3総合パック<br>（展開・因数分解）</button>
            </div>
        </div>
        <p style="font-size: 0.8rem; color: #999; text-align: center;">※各パック20問以上からランダムで5問出題されます</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress" id="progress"></div>
            <button class="back-to-menu" onclick="confirmBack()">🏠 メニューへ</button>
        </div>
        <div class="question" id="q-text"></div>
        <div class="options" id="options"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">次へ進む</button>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 style="color: var(--success);">トレーニング完了！</h2>
        <div id="result-text" style="font-size: 1.5rem; margin: 20px 0;"></div>
        <button class="menu-btn" style="width: 100%;" onclick="showMenu()">パック選択画面に戻る</button>
    </div>
</div>

<script>
    const allQuestions = {
        g1: [
            { q: "0.125 × 24", opts: ["3", "4", "2.4"], ans: 0, hint: "0.125 = 1/8 なので 1/8 × 24 = 3" },
            { q: "0.25 × 32", opts: ["4", "8", "16"], ans: 1, hint: "0.25 = 1/4 なので 1/4 × 32 = 8" },
            { q: "0.75 × 16", opts: ["12", "8", "10"], ans: 0, hint: "0.75 = 3/4 なので 3/4 × 16 = 12" },
            { q: "1.25 × 8", opts: ["8", "10", "12"], ans: 1, hint: "1.25 = 5/4 なので 5/4 × 8 = 10" },
            { q: "1.11 × 31 + 1.11 × 69", opts: ["11.1", "111", "1110"], ans: 1, hint: "1.11 × (31+69) = 1.11 × 100" },
            { q: "25 × 13 × 4", opts: ["130", "1300", "2600"], ans: 1, hint: "(25 × 4) × 13 = 100 × 13" },
            { q: "3.14 × 7.5 + 3.14 × 2.5", opts: ["31.4", "314", "3.14"], ans: 0, hint: "3.14 × (7.5+2.5) = 31.4" },
            { q: "0.375 × 16", opts: ["4", "6", "8"], ans: 1, hint: "0.375 = 3/8 なので 3/8 × 16 = 6" },
            { q: "0.625 × 80", opts: ["50", "40", "60"], ans: 0, hint: "0.625 = 5/8 なので 5/8 × 80 = 50" },
            { q: "9.9 × 13", opts: ["128.7", "117.7", "130.3"], ans: 0, hint: "(10 - 0.1) × 13 = 130 - 1.3" },
            { q: "0.5 × 1.23 × 2", opts: ["1.23", "2.46", "12.3"], ans: 0, hint: "(0.5 × 2) × 1.23 = 1 × 1.23" },
            { q: "125 × 7 × 8", opts: ["700", "7000", "5600"], ans: 1, hint: "(125 × 8) × 7 = 1000 × 7" },
            { q: "3.14 × 1.5 - 3.14 × 0.5", opts: ["3.14", "31.4", "0.314"], ans: 0, hint: "3.14 × (1.5-0.5) = 3.14" },
            { q: "35 × 101", opts: ["3535", "3501", "3555"], ans: 0, hint: "35 × (100+1) = 3500 + 35" },
            { q: "0.2 × 1.5", opts: ["0.3", "3", "0.03"], ans: 0, hint: "2/10 × 15/10 = 30/100 = 0.3" },
            { q: "12 × 3.14 + 18 × 3.14", opts: ["62.8", "94.2", "111"], ans: 1, hint: "(12+18) × 3.14 = 30 × 3.14" },
            { q: "(-25) × 3.1 × (-4)", opts: ["310", "-310", "31"], ans: 0, hint: "(-25 × -4) × 3.1 = 100 × 3.1" },
            { q: "0.8 × 12.5", opts: ["10", "1", "100"], ans: 0, hint: "8/10 × 125/10 = 1000/100 = 10" },
            { q: "15 × 3.14 - 5 × 3.14", opts: ["31.4", "3.14", "314"], ans: 0, hint: "(15-5) × 3.14 = 31.4" },
            { q: "0.125 × 800", opts: ["100", "80", "125"], ans: 0, hint: "1/8 × 800 = 100" }
        ],
        g2: [
            { q: "x=12, y=-6 のとき (2x+2y)÷2 の値", opts: ["6", "12", "18"], ans: 0, hint: "x+y = 12-6 = 6" },
            { q: "a=1/2 のとき 4(a+3)-2(a+6) の値", opts: ["1", "2", "3"], ans: 0, hint: "整理すると 2a。 2 × 1/2 = 1" },
            { q: "0.1x + 0.2y = 1 をxについて解く", opts: ["x=10-2y", "x=1-0.2y", "x=10-y"], ans: 0, hint: "全体10倍: x+2y=10" },
            { q: "24 × 15 + 24 × 35", opts: ["1200", "2400", "120"], ans: 0, hint: "24 × (15+35) = 24 × 50" },
            { q: "a=1/3, b=1/2 のとき 6(a+b)", opts: ["5", "1", "6"], ans: 0, hint: "6a + 6b = 2 + 3 = 5" },
            { q: "x=55 のとき x²-5x を x(x-5) で計算", opts: ["2750", "3000", "2500"], ans: 0, hint: "55 × 50 = 2750" },
            { q: "y=2x-4 をxについて解く", opts: ["x=(y+4)/2", "x=y/2+4", "x=y-2"], ans: 0, hint: "2x=y+4 より x=(y+4)/2" },
            { q: "a=10, b=5 のとき (a²b)÷ab", opts: ["5", "10", "2"], ans: 1, hint: "整理すると a なので 10" },
            { q: "3x - y = 6 をyについて解く", opts: ["y=3x-6", "y=-3x+6", "y=3x+6"], ans: 0, hint: "y = 3x - 6" },
            { q: "m=50, n=2 のとき m²÷(mn)", opts: ["25", "50", "100"], ans: 0, hint: "m/n = 50/2 = 25" },
            { q: "x+y=10, x-y=4 のとき x²-y² の値", opts: ["14", "40", "140"], ans: 1, hint: "(x+y)(x-y) = 10 × 4 = 40" },
            { q: "0.5x - 0.3y = 1.5 を10倍して整理", opts: ["5x-3y=15", "x-y=3", "5x-3y=1.5"], ans: 0, hint: "各項を10倍します" },
            { q: "a=15, b=5 のとき a²-3ab+2ab", opts: ["150", "225", "15"], ans: 0, hint: "a(a-b) = 15(15-5) = 150" },
            { q: "V=Sh をhについて解く", opts: ["h=V/S", "h=VS", "h=S/V"], ans: 0, hint: "両辺をSで割ります" },
            { q: "x=2.5 のとき 4x+2", opts: ["10", "12", "14"], ans: 1, hint: "4×2.5 + 2 = 10 + 2 = 12" },
            { q: "2(x+3y) - (2x-y)", opts: ["7y", "5y", "4x+5y"], ans: 0, hint: "2x+6y-2x+y = 7y" },
            { q: "x=20, y=1/4 のとき 8xy", opts: ["40", "20", "160"], ans: 0, hint: "8×20×1/4 = 2×20 = 40" },
            { q: "l=2πr をrについて解く", opts: ["r=l/2π", "r=2πl", "r=l/π"], ans: 0, hint: "両辺を2πで割ります" },
            { q: "a=3.14, r=10 のとき 2r × a", opts: ["62.8", "31.4", "628"], ans: 0, hint: "2×10×3.14 = 62.8" },
            { q: "1.2x + 0.8x", opts: ["2x", "20x", "1.28x"], ans: 0, hint: "(1.2+0.8)x = 2x" }
        ],
        g3: [
            { q: "102²", opts: ["10204", "10404", "10004"], ans: 1, hint: "(100+2)² = 10000+400+4" },
            { q: "98²", opts: ["9604", "9600", "9804"], ans: 0, hint: "(100-2)² = 10000-400+4" },
            { q: "57² - 43²", opts: ["1400", "140", "1000"], ans: 0, hint: "(57+43)(57-43) = 100×14" },
            { q: "19 × 21", opts: ["399", "401", "391"], ans: 0, hint: "(20-1)(20+1) = 400-1" },
            { q: "x=17 のとき x²+6x+9", opts: ["400", "391", "289"], ans: 0, hint: "(x+3)² = 20² = 400" },
            { q: "49 × 51", opts: ["2499", "2501", "2401"], ans: 0, hint: "(50-1)(50+1) = 2500-1" },
            { q: "7.5² - 2.5²", opts: ["50", "56.25", "45"], ans: 0, hint: "(7.5+2.5)(7.5-2.5) = 10×5" },
            { q: "103 × 97", opts: ["9991", "10009", "9999"], ans: 0, hint: "(100+3)(100-3) = 10000-9" },
            { q: "x=95 のとき x²+10x+25", opts: ["10000", "9025", "9500"], ans: 0, hint: "(x+5)² = 100² = 10000" },
            { q: "64² - 36²", opts: ["2800", "3000", "2500"], ans: 0, hint: "(64+36)(64-36) = 100×28" },
            { q: "20.1 × 19.9", opts: ["399.99", "400.01", "399.91"], ans: 0, hint: "(20+0.1)(20-0.1) = 400-0.01" },
            { q: "x=102, y=98 のとき x²-y²", opts: ["400", "800", "1000"], ans: 1, hint: "(x+y)(x-y) = 200×4 = 800" },
            { q: "101²", opts: ["10201", "10101", "10202"], ans: 0, hint: "(100+1)² = 10000+200+1" },
            { q: "x=47, y=3 のとき x²+2xy+y²", opts: ["2500", "2209", "2400"], ans: 0, hint: "(x+y)² = 50² = 2500" },
            { q: "91 × 89", opts: ["8099", "8101", "8091"], ans: 0, hint: "(90+1)(90-1) = 8100-1" },
            { q: "5.5² - 4.5²", opts: ["10", "11", "9"], ans: 0, hint: "(5.5+4.5)(5.5-4.5) = 10×1" },
            { q: "x=25 のとき x²-10x+25", opts: ["400", "625", "0"], ans: 0, hint: "(x-5)² = 20² = 400" },
            { q: "105 × 95", opts: ["9975", "10025", "9925"], ans: 0, hint: "(100+5)(100-5) = 10000-25" },
            { q: "x=13, y=7 のとき (x+y)² - 4xy", opts: ["36", "100", "49"], ans: 0, hint: "(x-y)² と変形できる。 (13-7)² = 36" },
            { q: "41²", opts: ["1681", "1601", "1641"], ans: 0, hint: "(40+1)² = 1600+80+1" }
        ]
    };

    let currentPack = [];
    let currentIdx = 0;
    let score = 0;

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
    }

    function startQuiz(gradeKey) {
        // 20問の中から5問をランダムに選んでシャッフル
        const all = [...allQuestions[gradeKey]];
        currentPack = all.sort(() => Math.random() - 0.5).slice(0, 5);
        
        currentIdx = 0;
        score = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function confirmBack() {
        if(confirm("メニューに戻りますか？")) showMenu();
    }

    function loadQuestion() {
        const data = currentPack[currentIdx];
        document.getElementById('progress').innerText = `問題 ${currentIdx + 1} / 5`;
        document.getElementById('q-text').innerText = data.q;
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = "";
        data.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i);
            optContainer.appendChild(btn);
        });
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function check(idx) {
        const data = currentPack[currentIdx];
        const f = document.getElementById('feedback');
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach(b => b.disabled = true);
        f.style.display = 'block';
        if(idx === data.ans) {
            score++;
            f.className = 'feedback correct';
            f.innerHTML = `<strong>正解！✨</strong><br>${data.hint}`;
        } else {
            f.className = 'feedback wrong';
            f.innerHTML = `<strong>不正解...</strong><br>解説：${data.hint}`;
            buttons[idx].style.borderColor = "var(--error)";
            buttons[data.ans].style.borderColor = "var(--success)";
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 5) {
            loadQuestion();
        } else {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-text').innerText = `スコア: ${score} / 5`;
        }
    }

    window.onload = showMenu;
</script>
</body>
</html>
