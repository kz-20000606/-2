<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校入試：計算の工夫マスター</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h1 { font-size: 1.2rem; color: #333; }
        .question { font-size: 1.1rem; margin-bottom: 15px; font-weight: bold; }
        button { display: block; width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; background: #fff; cursor: pointer; text-align: left; }
        button:hover { background: #e9ecef; }
        #feedback { margin-top: 15px; padding: 10px; display: none; border-radius: 5px; }
        .correct { background: #d4edda; color: #155724; }
        .wrong { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>計算の工夫 Q1</h1>
        <div class="question" id="q-text">102² を工夫して計算しなさい。</div>
        <div id="options">
            <button onclick="check(false)">10204</button>
            <button onclick="check(true)">10404</button>
            <button onclick="check(false)">10004</button>
        </div>
        <div id="feedback"></div>
    </div>

    <script>
        function check(isCorrect) {
            const f = document.getElementById('feedback');
            f.style.display = 'block';
            if(isCorrect) {
                f.className = 'feedback correct';
                f.innerHTML = '<strong>正解！</strong><br>(100+2)² = 10000 + 400 + 4 と考えれば暗算できます。';
            } else {
                f.className = 'feedback wrong';
                f.innerHTML = '<strong>惜しい！</strong><br>展開公式 (a+b)² = a² + 2ab + b² を思い出してみましょう。';
            }
        }
    </script>
</body>
</html>
