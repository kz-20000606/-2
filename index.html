<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高校入試：計算の工夫マスター</title>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --error: #dc3545; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .progress { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        .question { font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; line-height: 1.5; }
        .options { display: grid; gap: 10px; }
        button { padding: 15px; border: 2px solid #eee; border-radius: 10px; background: white; font-size: 1rem; cursor: pointer; transition: all 0.2s; text-align: left; }
        button:hover { border-color: var(--primary); background: #f0f7ff; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
        .correct { background: #e6f4ea; border: 1px solid var(--success); color: #1e7e34; }
        .wrong { background: #fce8e8; border: 1px solid var(--error); color: #a71d2a; }
        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; display: none; cursor: pointer; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress" id="progress">第 1 問 / 10</div>
        <div class="question" id="q-text">問題を読み込んでいます...</div>
        <div class="options" id="options"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>
