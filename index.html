<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単元別：計算の工夫トレーニング</title>
    <style>
        :root { --primary: #4a90e2; --success: #28a745; --error: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        h1 { text-align: center; color: var(--primary); font-size: 1.3rem; margin-top: 0; margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grade-section { margin-bottom: 25px; }
        .grade-title { font-weight: bold; font-size: 1rem; color: #555; margin-bottom: 10px; padding-left: 5px; border-left: 4px solid #aaa; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .menu-btn { padding: 15px 10px; font-size: 0.95rem; background: white; border: 1.5px solid var(--primary); color: var(--primary); border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; text-align: center; line-height: 1.3; }
        .menu-btn:hover { background: var(--primary); color: white; }
        .progress-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .progress { font-size: 0.9rem; color: #666; font-weight: bold; }
        .back-to-menu { padding: 6px 12px; font-size: 0.8rem; background: #f0f0f0; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; color: #333; }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; background: #f8f9fa; padding: 20px; border-radius: 8px; line-height: 1.6; border-left: 5px solid var(--primary); }
        .options { display: grid; gap: 10px; }
        .opt-btn { padding: 15px; border: 2px solid #eee; border-radius: 10px; background: white; font-size: 1rem; cursor: pointer; text-align: left; }
        .opt-btn:disabled { cursor: default; }
        #feedback { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; line-height: 1.6; }
        .correct { background: #e6f4ea; border: 1px solid var(--success); color: #1e7e34; }
        .wrong { background: #fce8e8; border: 1px solid var(--error); color: #a71d2a; }
        #next-btn { margin-top: 20px; width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; display: none; cursor: pointer; }
        .hidden { display: none; }
        @media (max-width: 480px) { .menu-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>計算の工夫トレーニング</h1>
        
        <div class="grade-section">
            <div class="grade-title">中学1年生</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('g1_fraction')">分数・小数の変換<br>（0.125など）</button>
                <button class="menu-btn" onclick="startQuiz('g1_distributive')">分配法則の工夫<br>（1.11×100など）</button>
            </div>
        </div>

        <div class="grade-section">
            <div class="grade-title">中学2年生</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('g2_substitution')">式の値の工夫<br>（代入の前に整理）</button>
                <button class="menu-btn" onclick="startQuiz('g2_equation')">等式の変形<br>（小数を消す工夫）</button>
            </div>
        </div>

        <div class="grade-section">
            <div class="grade-title">中学3年生</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('g3_expansion')">展開公式の利用<br>（102²など）</button>
                <button class="menu-btn" onclick="startQuiz('g3_factoring')">因数分解の利用<br>（2乗の差など）</button>
            </div>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-container">
            <div class="progress" id="progress"></div>
            <button class="back-to-menu" onclick="confirmBack()">🏠 メニューへ</button>
        </div>
        <div class="question" id="q-text"></div>
        <div class="options" id="options"></div>
        <div id="feedback"></div>
        <button id="next-btn" onclick="nextQuestion()">次の問題へ進む</button>
    </div>

    <div id="result-screen" class="hidden" style="text-align: center;">
        <h2 style="color: var(--success);">トレーニング完了！</h2>
        <div id="result-text"></div>
        <button class="menu-btn" style="width: 100%; margin-top:20px;" onclick="showMenu()">メニューに戻る</button>
    </div>
</div>

<script>
    const allPacks = {
        // 中1: 分数・小数
        g1_fraction: [
            { q: "0.125 × 24 を計算しなさい。", opts: ["3", "4", "6"], ans: 0, hint: "0.125 = 1/8 なので、1/8 × 24 = 3 です。" },
            { q: "0.25 × 36 を計算しなさい。", opts: ["8", "9", "12"], ans: 1, hint: "0.25 = 1/4 なので、1/4 × 36 = 9 です。" },
            { q: "0.875 × 16 を計算しなさい。", opts: ["12", "14", "15"], ans: 1, hint: "0.875 = 7/8 なので、7/8 × 16 = 14 です。" }
        ],
        // 中1: 分配法則
        g1_distributive: [
            { q: "1.11 × 31 + 1.11 × 69 を計算しなさい。", opts: ["11.1", "111", "1110"], ans: 1, hint: "1.11 × (31+69) = 1.11 × 100 = 111 です。" },
            { q: "25 × 17 × 4 を計算しなさい。", opts: ["170", "1700", "425"], ans: 1, hint: "(25 × 4) × 17 = 100 × 17 = 1700 です。" },
            { q: "3.14 × 15.8 - 3.14 × 5.8 を計算しなさい。", opts: ["3.14", "31.4", "314"], ans: 1, hint: "3.14 × (15.8 - 5.8) = 3.14 × 10 = 31.4 です。" }
        ],
        // 中2: 代入の工夫
        g2_substitution: [
            { q: "x=15, y=-5 のとき、(x+y)+(x-y) の値を求めなさい。", opts: ["10", "20", "30"], ans: 2, hint: "式を整理すると 2x になります。 2 × 15 = 30 です。" },
            { q: "a=1/2 のとき、4(a+3) - 2(a+6) の値を求めなさい。", opts: ["1", "2", "3"], ans: 0, hint: "式を整理すると 2a になります。 2 × 1/2 = 1 です。" }
        ],
        // 中2: 等式の変形
        g2_equation: [
            { q: "0.1x + 0.2y = 1 をxについて解きなさい。", opts: ["x = 10 - 2y", "x = 1 - 0.2y", "x = 10 - y"], ans: 0, hint: "まず全体を10倍して小数を消します。 x + 2y = 10 より x = 10 - 2y です。" }
        ],
        // 中3: 展開公式
        g3_expansion: [
            { q: "102² を工夫して計算しなさい。", opts: ["10204", "10404", "10004"], ans: 1, hint: "(100+2)² = 10000 + 400 + 4 = 10404 です。" },
            { q: "49 × 51 を工夫して計算しなさい。", opts: ["2491", "2499", "2501"], ans: 1, hint: "(50-1)(50+1) = 2500 - 1 = 2499 です。" }
        ],
        // 中3: 因数分解
        g3_factoring: [
            { q: "75² - 25² を計算しなさい。", opts: ["2500", "5000", "5625"], ans: 1, hint: "(75+25)(75-25) = 100 × 50 = 5000 です。" },
            { q: "x=18 のとき、x² + 4x + 4 の値を求めなさい。", opts: ["324", "400", "441"], ans: 1, hint: "(x+2)² に因数分解します。 (18+2)² = 20² = 400 です。" }
        ]
    };

    let currentPack = [];
    let currentIdx = 0;
    let score = 0;

    window.onload = showMenu;

    function showMenu() {
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
    }

    function startQuiz(packKey) {
        currentPack = allPacks[packKey];
        currentIdx = 0;
        score = 0;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function confirmBack() {
        if(confirm("メニューに戻りますか？")) {
            showMenu();
        }
    }

    function loadQuestion() {
        const data = currentPack[currentIdx];
        document.getElementById('progress').innerText = `問題 ${currentIdx + 1} / ${currentPack.length}`;
        document.getElementById('q-text').innerText = data.q;
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = "";
        data.opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => check(i);
            optContainer.appendChild(btn);
        });
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function check(idx) {
        const data = currentPack[currentIdx];
        const f = document.getElementById('feedback');
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach(b => b.disabled = true);
        f.style.display = 'block';
        if(idx === data.ans) {
            score++;
            f.className = 'feedback correct';
            f.innerHTML = `<strong>正解！✨</strong><br>${data.hint}`;
        } else {
            f.className = 'feedback wrong';
            f.innerHTML = `<strong>不正解...</strong><br>ヒント：${data.hint}`;
        }
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < currentPack.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('result-text').innerHTML = `スコア: <strong>${score} / ${currentPack.length}</strong>`;
    }
</script>

</body>
</html>
